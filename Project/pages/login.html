<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/reset.css">
</head>

<body>
    <div class="container">
        <h2>Đăng nhập</h2>
        <div class="subtitle">Đăng nhập tài khoản để sử dụng hệ thống quản lý.</div>

        <div class="form-group">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password">
        </div>

        <div class="row">
            <label>
                <input type="checkbox"> 
                <span class="remember">Nhớ tài khoản</span>
            </label>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <button>Đăng nhập</button>

        <div class="footer">
            Bạn chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </div>
    </div>
</body>

</html>
