<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/reponsive.css">
    <link rel="stylesheet" href="../css/reset.css">

</head>

<body>
    <div class="container">
        <h1>Đăng ký tài khoản</h1>
        <div class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</div>
        <div class="box-contianer">
            <div class="row">
                <div class="form-group">
                    <label for="midle-name">Họ và tên đệm</label>
                    <input type="text" id="midle-name">
                    <div class="error" id="error-midle-name"></div>
                </div>
                <div class="form-group">
                    <label for="name">Tên</label>
                    <input type="text" id="name">
                    <div class="error" id="error-name"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" placeholder="you@company.com" id="email">
                <div class="error" id="error-email"></div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password">
                <div class="error" id="error-password"></div>
            </div>

            <div class="checkbox">
                <div class = "left-checkbox">
                    <input type="checkbox" id="check-box">
                    <span>Bạn đồng ý với <a href="#">chính sách và điều khoản</a></span>
                </div>
                <div class="error" id="notCheckBox"></div>
            </div>

            <button id="submit-btn" onclick="createAccount()">Đăng ký</button>

            <div class="login">
                Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>
    <div id="toastBox"></div>
    <script src="../js/register.js"></script>
</body>

</html>
